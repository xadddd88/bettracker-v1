          write('lib/security/csp-report.ts', r'''export const MAX_CSP_REPORT_BODY_BYTES = 32 * 1024
export const MAX_CSP_REPORTS = 20
export const MAX_CSP_REPORT_FIELD_LENGTH = 256

export class CspBodyTooLargeError extends Error {
  constructor() {
    super('CSP report body too large')
    this.name = 'CspBodyTooLargeError'
  }
}

export class CspReportParseError extends Error {
  constructor(message = 'Invalid CSP report') {
    super(message)
    this.name = 'CspReportParseError'
  }
}

export interface SanitizedCspReport {
  documentUri?: string
  referrer?: string
  blockedUri?: string
  violatedDirective?: string
  effectiveDirective?: string
  disposition?: string
  statusCode?: number
  sourceFile?: string
  lineNumber?: number
  columnNumber?: number
}

type UnknownRecord = Record<string, unknown>

function isRecord(value: unknown): value is UnknownRecord {
  return typeof value === 'object' && value !== null && !Array.isArray(value)
}

function boundedString(value: unknown): string | undefined {
  if (typeof value !== 'string') return undefined
  const normalized = value.replace(/[\u0000-\u001f\u007f]/g, '').trim()
  if (!normalized) return undefined
  return normalized.slice(0, MAX_CSP_REPORT_FIELD_LENGTH)
}

function boundedInteger(value: unknown): number | undefined {
  const n = typeof value === 'number' ? value : typeof value === 'string' ? Number(value) : NaN
  return Number.isInteger(n) && n >= 0 ? n : undefined
}

function sanitizeUrl(value: unknown): string | undefined {
  const raw = boundedString(value)
  if (!raw) return undefined

  const lower = raw.toLowerCase()
  if (lower === 'inline' || lower === 'eval' || lower === 'self') return `[${lower}]`
  if (lower.startsWith('data:')) return '[data]'
  if (lower.startsWith('blob:')) return '[blob]'

  if (raw.startsWith('/')) {
    return raw.split(/[?#]/, 1)[0].slice(0, MAX_CSP_REPORT_FIELD_LENGTH) || '/'
  }

  try {
    const url = new URL(raw)
    if (!['http:', 'https:', 'ws:', 'wss:'].includes(url.protocol)) return '[unsupported-url]'
    url.username = ''
    url.password = ''
    url.search = ''
    url.hash = ''
    return url.toString().slice(0, MAX_CSP_REPORT_FIELD_LENGTH)
  } catch {
    return '[invalid-url]'
  }
}

function sanitizeLegacyBody(body: UnknownRecord): SanitizedCspReport {
  return compactReport({
    documentUri: sanitizeUrl(body['document-uri']),
    referrer: sanitizeUrl(body.referrer),
    blockedUri: sanitizeUrl(body['blocked-uri']),
    violatedDirective: boundedString(body['violated-directive']),
    effectiveDirective: boundedString(body['effective-directive']),
    disposition: boundedString(body.disposition),
    statusCode: boundedInteger(body['status-code']),
    sourceFile: sanitizeUrl(body['source-file']),
    lineNumber: boundedInteger(body['line-number']),
    columnNumber: boundedInteger(body['column-number']),
  })
}

function sanitizeReportingBody(body: UnknownRecord): SanitizedCspReport {
  return compactReport({
    documentUri: sanitizeUrl(body.documentURL ?? body['document-uri']),
    referrer: sanitizeUrl(body.referrer),
    blockedUri: sanitizeUrl(body.blockedURL ?? body['blocked-uri']),
    violatedDirective: boundedString(body.violatedDirective ?? body['violated-directive']),
    effectiveDirective: boundedString(body.effectiveDirective ?? body['effective-directive']),
    disposition: boundedString(body.disposition),
    statusCode: boundedInteger(body.statusCode ?? body['status-code']),
    sourceFile: sanitizeUrl(body.sourceFile ?? body['source-file']),
    lineNumber: boundedInteger(body.lineNumber ?? body['line-number']),
    columnNumber: boundedInteger(body.columnNumber ?? body['column-number']),
  })
}

function compactReport(report: SanitizedCspReport): SanitizedCspReport {
  return Object.fromEntries(
    Object.entries(report).filter(([, value]) => value !== undefined)
  ) as SanitizedCspReport
}

export function parseCspReports(payload: unknown): SanitizedCspReport[] {
  if (Array.isArray(payload)) {
    const reports: SanitizedCspReport[] = []
    for (const entry of payload.slice(0, MAX_CSP_REPORTS)) {
      if (!isRecord(entry) || entry.type !== 'csp-violation' || !isRecord(entry.body)) continue
      reports.push(sanitizeReportingBody(entry.body))
    }
    if (reports.length === 0) throw new CspReportParseError()
    return reports
  }

  if (!isRecord(payload) || !isRecord(payload['csp-report'])) {
    throw new CspReportParseError()
  }

  return [sanitizeLegacyBody(payload['csp-report'])]
}

export async function readBodyCapped(
  request: Request,
  maxBytes = MAX_CSP_REPORT_BODY_BYTES,
): Promise<string> {
  if (!request.body) return ''

  const reader = request.body.getReader()
  const chunks: Uint8Array[] = []
  let total = 0

  while (true) {
    const { done, value } = await reader.read()
    if (done) break
    if (!value) continue

    total += value.byteLength
    if (total > maxBytes) {
      await reader.cancel().catch(() => undefined)
      throw new CspBodyTooLargeError()
    }
    chunks.push(value)
  }

  const combined = new Uint8Array(total)
  let offset = 0
  for (const chunk of chunks) {
    combined.set(chunk, offset)
    offset += chunk.byteLength
  }

  return new TextDecoder().decode(combined)
}
''')

          write('app/api/csp-report/route.ts', r'''import { NextRequest, NextResponse } from 'next/server'
import { canonicalClientIp, enforceRateLimit, RATE_LIMITS } from '@/lib/rate-limit'
import {
  CspBodyTooLargeError,
  CspReportParseError,
  MAX_CSP_REPORT_BODY_BYTES,
  parseCspReports,
  readBodyCapped,
} from '@/lib/security/csp-report'

const ACCEPTED_MEDIA_TYPES = new Set([
  'application/csp-report',
  'application/reports+json',
  'application/json',
])

function jsonError(status: number, error: string, headers?: HeadersInit) {
  return NextResponse.json({ success: false, error }, { status, headers })
}

function requestMediaType(req: NextRequest): string {
  return (req.headers.get('content-type') ?? '').split(';', 1)[0].trim().toLowerCase()
}

export async function POST(req: NextRequest) {
  const mediaType = requestMediaType(req)
  if (!ACCEPTED_MEDIA_TYPES.has(mediaType)) {
    return jsonError(415, 'Unsupported CSP report content type')
  }

  const contentLength = Number(req.headers.get('content-length'))
  if (Number.isFinite(contentLength) && contentLength > MAX_CSP_REPORT_BODY_BYTES) {
    return jsonError(413, 'CSP report body too large')
  }

  const ip = canonicalClientIp(
    req.headers.get('x-forwarded-for'),
    req.headers.get('x-real-ip'),
  )
  const limit = await enforceRateLimit(`csp-report:${ip}`, RATE_LIMITS.cspReport())

  if (limit.unavailable) {
    return jsonError(503, 'CSP report service temporarily unavailable')
  }
  if (!limit.allowed) {
    return jsonError(429, 'Too many CSP reports', {
      'Retry-After': String(limit.retryAfter || 60),
    })
  }

  let raw: string
  try {
    raw = await readBodyCapped(req)
  } catch (error) {
    if (error instanceof CspBodyTooLargeError) {
      return jsonError(413, 'CSP report body too large')
    }
    console.error('[CSP] body read failed')
    return jsonError(400, 'Invalid CSP report')
  }

  let payload: unknown
  try {
    payload = JSON.parse(raw)
  } catch {
    return jsonError(400, 'Invalid CSP report JSON')
  }

  try {
    const reports = parseCspReports(payload)
    for (const report of reports) {
      console.warn('[CSP] violation', JSON.stringify(report))
    }
  } catch (error) {
    if (!(error instanceof CspReportParseError)) {
      console.error('[CSP] report processing failed')
    }
    return jsonError(400, 'Invalid CSP report shape')
  }

  return new NextResponse(null, { status: 204 })
}
''')

          write('next.config.ts', r'''import { withSentryConfig } from '@sentry/nextjs'
import type { NextConfig } from 'next'

const supabaseOrigin = process.env.NEXT_PUBLIC_SUPABASE_URL ?? ''
const posthogOrigin  = process.env.NEXT_PUBLIC_POSTHOG_HOST ?? 'https://eu.i.posthog.com'

// Decision #054 Phase A: CSP remains Report-Only. This phase hardens the
// reporting endpoint and baseline headers without enabling enforcement or
// removing unsafe-inline. Nonce/hash enforcement requires a later review.
const cspDirectives = [
  "default-src 'self'",
  // Next.js App Router injects inline hydration/streaming scripts
  "script-src 'self' 'unsafe-inline'",
  // Tailwind and Next.js inject critical CSS inline
  "style-src 'self' 'unsafe-inline'",
  // Fonts are self-hosted by next/font at build time — no external CDN at runtime
  "font-src 'self'",
  // data: for base64 images; blob: for Next.js image optimisation
  "img-src 'self' data: blob:",
  // Supabase REST+auth (https) and Realtime (wss); PostHog analytics events.
  // Sentry is tunnelled through /monitoring (same-origin) — no external entry needed.
  [
    "connect-src 'self'",
    supabaseOrigin,
    supabaseOrigin.replace(/^https/, 'wss'),
    posthogOrigin,
  ].filter(Boolean).join(' '),
  "frame-ancestors 'none'",
  "base-uri 'self'",
  "form-action 'self'",
  "object-src 'none'",
  "report-uri /api/csp-report",
].join('; ')

const nextConfig: NextConfig = {
  reactStrictMode: true,
  async headers() {
    return [
      {
        source: '/(.*)',
        headers: [
          {
            key:   'Content-Security-Policy-Report-Only',
            value: cspDirectives,
          },
          {
            key: 'X-Content-Type-Options',
            value: 'nosniff',
          },
          {
            key: 'Referrer-Policy',
            value: 'strict-origin-when-cross-origin',
          },
          {
            key: 'X-Frame-Options',
            value: 'DENY',
          },
          {
            key: 'Permissions-Policy',
            value: 'camera=(), microphone=(), geolocation=(), payment=(), usb=()',
          },
        ],
      },
    ]
  },
}

export default withSentryConfig(nextConfig, {
  org: process.env.SENTRY_ORG,
  project: process.env.SENTRY_PROJECT,

  silent: !process.env.CI,

  widenClientFileUpload: true,

  // Proxy Sentry requests through Next.js to avoid ad blockers
  tunnelRoute: '/monitoring',

  // Delete source maps from client bundle after uploading to Sentry
  sourcemaps: {
    filesToDeleteAfterUpload: ['.next/static/**/*.map'],
  },

  webpack: {
    reactComponentAnnotation: { enabled: true },
    treeshake: { removeDebugLogging: true },
    automaticVercelMonitors: true,
  },
})
''')

