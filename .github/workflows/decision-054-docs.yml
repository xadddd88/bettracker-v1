name: Decision 054 Governance Updates

on:
  push:
    branches:
      - feat/decision-054-csp-phase-a
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  update-governance:
    if: (github.ref_name == 'feat/decision-054-csp-phase-a' || github.head_ref == 'feat/decision-054-csp-phase-a') && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/decision-054-csp-phase-a
          fetch-depth: 0

      - name: Update Decision 054 governance surfaces
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          decisions_path = Path('docs/decisions.md')
          decisions = decisions_path.read_text(encoding='utf-8')
          decision_054 = r'''## Decision #054 — CSP Report Hardening & Security Headers, Phase A
**Date:** 2026-07-11  
**Proposed by:** CPO + Lead Engineer  
**Approved by:** CPO autonomous-window scope  
**Status:** PHASE A IMPLEMENTED / AWAITING CPO REVIEW

**Decision:** Harden CSP report ingestion and add baseline HTTP security headers while keeping CSP in Report-Only mode.

**Why:**
- Production CSP reported violations but did not block them, which is correct for observation, but the report endpoint accepted unlimited raw bodies and logged `script-sample` plus unredacted URLs.
- The application lacked explicit `nosniff`, Referrer-Policy, X-Frame-Options, and Permissions-Policy headers.
- Enforcing CSP before understanding Next.js inline hydration and external source requirements risks breaking the application.

**Phase A:**
- bounded 32 KB CSP body reader;
- legacy and Reporting API normalization;
- strict sanitization, URL query/fragment removal, and no script-sample/raw payload logging;
- durable fail-closed CSP report limits through Decision #052;
- `204/400/413/415/429/503` route contract;
- baseline security headers;
- CSP remains `Content-Security-Policy-Report-Only` with `unsafe-inline` unchanged.

**Phase B:** Not implemented. Requires production violation observation, source classification, a reviewed nonce/hash strategy, compatibility smoke, and separate CPO approval.

**Scope:** No migration, Supabase write, provider call, environment change, enrichment, odds work, or betting-signal change. FP-001 remains active.

Reference: `docs/csp-security-hardening-scope-decision-054.md`
'''
          if '## Decision #054 — CSP Report Hardening & Security Headers, Phase A' not in decisions:
              marker = '\n---\n\n*Last updated: 2026-07-11*'
              pos = decisions.rfind(marker)
              if pos == -1:
                  raise SystemExit('decision footer marker not found')
              decisions = decisions[:pos] + '\n---\n\n' + decision_054 + decisions[pos:]
          decisions_path.write_text(decisions, encoding='utf-8')

          ledger_path = Path('docs/decision-ledger-numbering-governance.md')
          ledger = ledger_path.read_text(encoding='utf-8')
          replacements = [
              ('Occupied: #001-#019, #021-#031, #033-#053', 'Occupied: #001-#019, #021-#031, #033-#054'),
              ('Reserved next: #054 — CSP Enforcement & CSP Report Hardening\nNext unreserved after #054: #055', 'Current active: #054 — CSP Report Hardening & Security Headers, Phase A\nNext unreserved: #055'),
              ('| #054 | **RESERVED** — CSP Enforcement & CSP Report Hardening |', '| #054 | CSP Report Hardening & Security Headers, Phase A — IMPLEMENTED / AWAITING CPO REVIEW |'),
          ]
          for old, new in replacements:
              if old not in ledger:
                  raise SystemExit(f'ledger anchor missing: {old}')
              ledger = ledger.replace(old, new, 1)
          ledger_path.write_text(ledger, encoding='utf-8')

          state_path = Path('PROJECT_STATE.md')
          state = state_path.read_text(encoding='utf-8')
          old = '| Next reserved decision | **#054 — CSP Enforcement & CSP Report Hardening** |'
          new = '| Current decision | **#054 — CSP Report Hardening & Security Headers, Phase A (AWAITING CPO REVIEW)** |\n| Next unreserved decision | **#055** |'
          if old not in state:
              raise SystemExit('PROJECT_STATE decision anchor missing')
          state = state.replace(old, new, 1)
          anchor = '- production domain writes are mediated through reviewed RPC/server operations.\n'
          addition = anchor + '- Decision #054 Phase A hardens CSP report ingestion and adds baseline headers; CSP intentionally remains Report-Only pending evidence and nonce/hash design.\n'
          if anchor not in state:
              raise SystemExit('PROJECT_STATE security anchor missing')
          state = state.replace(anchor, addition, 1)
          state_path.write_text(state, encoding='utf-8')
          PY

          rm .github/workflows/decision-054-docs.yml
          rm -f .github/workflows/decision-054-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "docs: record Decision #054 Phase A governance"
          git push origin HEAD:feat/decision-054-csp-phase-a
