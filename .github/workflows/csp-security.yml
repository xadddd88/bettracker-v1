name: CSP Security

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  csp-security:
    name: CSP security suite (Decision #054)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run CSP security suite
        run: npm run test:csp-security
      - name: Upload decision log snapshot
        uses: actions/upload-artifact@v4
        with:
          name: decision-log-054
          path: docs/decisions.md
          retention-days: 1
