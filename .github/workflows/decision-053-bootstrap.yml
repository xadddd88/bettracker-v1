name: Decision 053 Docs Bootstrap

on:
  push:
    branches:
      - docs/decision-053-project-state-reconciliation

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/decision-053-project-state-reconciliation
          fetch-depth: 0
      - name: Reconcile project state and migration inventory
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          decisions_path = Path('docs/decisions.md')
          decisions = decisions_path.read_text(encoding='utf-8')

          old_helper = "- Shared helper `lib/rate-limit.ts` `enforceRateLimit(key, windows)` — **fail-open** on any limiter failure (logged; a limiter outage must not down the route), `RATE_LIMITS` centralizes env-tunable windows (defaults unchanged: scanner 5/min+30/day, analyst 10/min+200/day, scout 3/min+50/day, coach 20/day, register 5/min+15/hour)."
          new_helper = "- Shared helper `lib/rate-limit.ts` `enforceRateLimit(key, windows)` — **fail-closed** on any limiter failure (RPC/store error or malformed response → `unavailable: true`; routes return 503 before any Anthropic spend or invite work). All keys are `sha256`-hashed before storage; register keys use a canonicalized client IP. `RATE_LIMITS` centralizes env-tunable windows (defaults unchanged: scanner 5/min+30/day, analyst 10/min+200/day, scout 3/min+50/day, coach 20/day, register 5/min+15/hour). *(Corrected post-merge: this bullet originally described the rejected pre-review fail-open draft; the CPO review reversed it before migration 023 was applied — see the execution record.)*"

          old_tests = "**Tests:** new CI suite `test:rate-limit` (7 cases: helper RPC call + mapping, fail-open on RPC error and missing admin, config sanity, no-in-memory-Map source sweep across all five routes, migration static guards). auth-invite's obsolete in-memory 429 test removed. All suites green: rate-limit 7/7, auth 16/16, agent 12/12, domain 13/13, financial 10/10, provider-safety 77/77, FP-001 26/26, quarantine 5/5, full build + tsc/lint clean."
          new_tests = "**Tests:** new CI suite `test:rate-limit` (12 cases at merged head `33ac046`: helper RPC call + mapping, FAILS CLOSED on RPC error / missing admin client / malformed responses, `canonicalClientIp` validation, config sanity, no-in-memory-Map source sweep across all five routes including the `unavailable → 503` branch, register canonical-IP keying, neutral Coach 429 message, and migration static guards including the per-key advisory lock plus two-phase check-then-consume). The auth-invite suite's obsolete in-memory 429 test was removed. All suites green: rate-limit 12/12, auth 16/16, agent 12/12, domain 13/13, financial 10/10, provider-safety 77/77, FP-001 26/26, quarantine 5/5, full build + tsc/lint clean. *(Corrected post-merge from the rejected pre-review \"7 cases / fail-open\" text.)*"

          if old_helper in decisions:
              decisions = decisions.replace(old_helper, new_helper, 1)
          elif new_helper not in decisions:
              raise SystemExit('Decision #052 helper paragraph not found')

          if old_tests in decisions:
              decisions = decisions.replace(old_tests, new_tests, 1)
          elif new_tests not in decisions:
              raise SystemExit('Decision #052 tests paragraph not found')

          decision_053 = r'''
## Decision #053 — Project State & Migration Reconciliation
**Date:** 2026-07-11  
**Proposed by:** CPO + Lead Engineer  
**Approved by:** Founder/CPO scope approval  
**Status:** IMPLEMENTED / AWAITING MERGE (docs-only)

**Decision:** Reconcile the repository's source-of-truth documentation with production reality through Decision #052, record migration-ledger drift without applying anything, and close superseded draft PRs without merging their stale branches.

**Why:**
- `PROJECT_STATE.md` was last updated on 2026-07-07 and still claimed production had zero SportMonks links, even though Decisions #045–#046 completed the controlled provider-link write.
- README still instructed operators to run only `001_initial_schema.sql`, despite the repository carrying migrations through 023 and known bootstrap drift.
- The Decision #052 body retained rejected fail-open wording and the obsolete 7-test count, while the final implementation and execution record are fail-closed with 12 tests.
- PR #90 and PR #106 remained open draft branches even though their numbering/evidence state was superseded.

**Scope:**
- Documentation, status, migration inventory, and PR disposition only.
- No runtime code, no migration application, no Supabase writes, no provider calls, no environment changes, no enrichment, no odds calls, and no betting signal.

**Reconciled facts:**
- Decisions #044–#046 completed the EPL canonical fixture, SportMonks discovery, and controlled `sportmonks:19722203` → canonical fixture link.
- Decisions #047–#049 completed atomic financial writes and removed direct authenticated writes from core and agent-domain tables.
- Decision #050 is deployed and route-verified, but its founder SMTP round-trip remains pending.
- Decision #051 quarantined 78 legacy FP-001 pricing records and removed readable fabricated pricing from live domain surfaces.
- Decision #052 deployed durable, fail-closed, cross-instance rate limits and passed a real parallel production contention test.

**Migration reconciliation:**
- Tracked migration numbering has no `008` file.
- Production's Supabase migration ledger contains timestamped entries and does not fully describe earlier manually applied history.
- `update_updated_at_column()` exists as an untracked historical object required by old migration files.
- Historical policy-name drift and REVIEW-ONLY/manual migrations are recorded; nothing is replayed or applied in this decision.
- `001_initial_schema.sql` is explicitly not a production bootstrap command.

**PR disposition:**
- PR #106: close as superseded; its `/odds/mapping` filter conclusion is already present in main.
- PR #90: close without merge; the policy is not adopted, its claimed Decision #020 is invalid, and any revival requires a fresh PR under Decision #055 or later.

**Numbering:**
- Decision #054 is reserved for CSP Enforcement & CSP Report Hardening.
- Decision #020 and the retired #032 reservation are not reused.

**Consequences:**
- `PROJECT_STATE.md`, README, the numbering ledger, and the migration reconciliation record become the current operational documentation set.
- The enrichment identity blocker is removed; the remaining enrichment gate is separate CPO runtime approval plus trust validation.
- Decision #050's SMTP round-trip remains a visible founder action and is not falsely marked complete.
'''.strip()

          if '## Decision #053 — Project State & Migration Reconciliation' not in decisions:
              marker = '\n---\n\n*Last updated:'
