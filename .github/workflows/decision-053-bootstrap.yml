              if pos == -1:
                  raise SystemExit('Decision log footer marker not found')
              decisions = decisions[:pos] + '\n---\n\n' + decision_053 + decisions[pos:]

          decisions = decisions.replace('*Last updated: 2026-07-10*', '*Last updated: 2026-07-11*')
          decisions_path.write_text(decisions, encoding='utf-8')

