name: Preview Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  # ── Job 1: JSON parser unit tests ──────────────────────────────────────────
  # Runs independently of any Vercel deployment.
  unit-tests:
    name: JSON parser unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run extractJsonObject tests
        run: node scripts/test-extract-json.mjs

  # ── Job 2: Smoke tests against Vercel preview deployment ───────────────────
  smoke:
    name: Smoke tests on preview
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve Vercel preview URL
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          PROJECT_ID="prj_HgkXfIh2s8J7fdjStH4atnBpXBa2"
          TEAM_ID="team_Evt0BlM2Dy7FxfskYnlNcMo4"

          # Compute deterministic branch alias slug:
          #   lowercase → replace non-[a-z0-9] with '-' → collapse runs → trim edges
          BRANCH_SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//;s/-$//')
          ALIAS_URL="https://bettracker-git-${BRANCH_SLUG}-betracker.vercel.app"

          PREVIEW_URL=""

          # ── Path 1: Vercel API by commit SHA (up to ~3 min) ──────────────
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret is not set — skipping API lookup, will use branch alias"
          else
            API="https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${TEAM_ID}&limit=10"
            echo "Polling Vercel API for commit sha=$SHA ..."

            for i in $(seq 1 18); do
              HTTP_CODE=$(curl -s \
                -o /tmp/vercel_resp.json \
                -w "%{http_code}" \
                --max-time 20 \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                "$API" 2>/dev/null || echo "000")

              if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
                echo "::warning::Vercel API returned HTTP $HTTP_CODE (token unauthorized) — falling back to branch alias"
                break
              fi

              if [ "$HTTP_CODE" != "200" ]; then
                echo "[$i] Vercel API HTTP $HTTP_CODE — retrying in 10s"
                sleep 10
                continue
              fi

              URL=$(jq -r \
                --arg sha "$SHA" \
                '[.deployments[] | select(.meta.githubCommitSha == $sha and .state == "READY")] | .[0].url // empty' \
                /tmp/vercel_resp.json 2>/dev/null || true)

              STATE=$(jq -r \
                --arg sha "$SHA" \
                '[.deployments[] | select(.meta.githubCommitSha == $sha)] | .[0].state // "not found"' \
                /tmp/vercel_resp.json 2>/dev/null || echo "parse_error")

              echo "[$i] API state=$STATE url=${URL:-—}"

              if [ -n "$URL" ]; then
                PREVIEW_URL="https://$URL"
                break
              fi

              sleep 10
            done
          fi

          # ── Path 2: Deterministic branch alias (up to ~3 min) ────────────
          if [ -z "$PREVIEW_URL" ]; then
            echo "API path did not yield a READY deployment — polling branch alias"
            echo "Branch alias: $ALIAS_URL"

            for i in $(seq 1 18); do
              ALIAS_HTTP=$(curl -s \
                -o /dev/null \
                -w "%{http_code}" \
                --max-time 20 \
                "${ALIAS_URL}/login" 2>/dev/null || echo "000")
              echo "[$i] Branch alias HTTP $ALIAS_HTTP"

              if [ "$ALIAS_HTTP" = "200" ]; then
                PREVIEW_URL="$ALIAS_URL"
                break
              fi

              sleep 10
            done
          fi

          # ── Fail clearly if neither path succeeded ────────────────────────
          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::Preview URL not reachable via API or branch alias within timeout"
            echo "Branch alias attempted: $ALIAS_URL"
            exit 1
          fi

          echo "Resolved preview URL: $PREVIEW_URL"
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        run: node scripts/smoke-test.mjs "${{ steps.preview.outputs.url }}"
