name: Preview Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decision-053-patch:
    name: Decision #053 log reconciliation
    if: github.head_ref == 'docs/decision-053-project-state-reconciliation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/decision-053-project-state-reconciliation
          fetch-depth: 0
      - name: Apply decision-log patch and remove temporary helpers
        run: |
          python scripts/patch-decision-053.py
          git fetch origin main
          git checkout origin/main -- .github/workflows/preview-tests.yml
          git rm scripts/patch-decision-053.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/decisions.md .github/workflows/preview-tests.yml
          git commit -m "docs: reconcile Decision #052 body and add Decision #053"
          git push origin HEAD:docs/decision-053-project-state-reconciliation

  unit-tests:
    name: JSON parser unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run extractJsonObject tests
        run: node scripts/test-extract-json.mjs

  quality:
    name: Typecheck & lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint

  safety-suites:
    name: Provider safety & FP-001 quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Provider safety suite
        run: npm run test:provider-safety
      - name: Analysis quality gate (FP-001) suite
        run: npm run test:analysis-quality-gate
      - name: "Financial safety suite (Decision #047)"
        run: npm run test:financial-safety
      - name: "Domain write boundaries suite (Decision #048)"
        run: npm run test:domain-write-boundaries
      - name: "Agent write boundaries suite (Decision #049)"
        run: npm run test:agent-write-boundaries
      - name: "Auth invite flow suite (Decision #050)"
        run: npm run test:auth-invite
      - name: "FP-001 legacy quarantine suite (Decision #051)"
        run: npm run test:fp001-quarantine
      - name: "Global rate-limit suite (Decision #052)"
        run: npm run test:rate-limit

  decision-053-source:
    name: Decision #053 source snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: decision-053-source
          path: docs/decisions.md
          retention-days: 1

  smoke:
    name: Smoke tests on preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve Vercel preview URL
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          PROJECT_ID="prj_HgkXfIh2s8J7fdjStH4atnBpXBa2"
          TEAM_ID="team_Evt0BlM2Dy7FxfskYnlNcMo4"

          BRANCH_SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//;s/-$//')
          ALIAS_URL="https://bettracker-git-${BRANCH_SLUG}-betracker.vercel.app"

          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set. Smoke tests require the Vercel API to confirm the exact commit is deployed before running."
            exit 1
          fi

          API="https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${TEAM_ID}&limit=10"
          PREVIEW_URL=""

          echo "Polling Vercel API for sha=$SHA (36 × 10 s = 6 min max)..."

          for i in $(seq 1 36); do
            HTTP_CODE=$(curl -s \
              -o /tmp/vercel_resp.json \
              -w "%{http_code}" \
              --max-time 20 \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "$API" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
              echo "::error::Vercel API HTTP $HTTP_CODE — VERCEL_TOKEN may be expired or have insufficient scope"
              exit 1
            fi

            if [ "$HTTP_CODE" != "200" ]; then
              echo "[$i/36] API HTTP $HTTP_CODE — retrying in 10s"
              sleep 10
              continue
            fi

            URL=$(jq -r \
              --arg sha "$SHA" \
              '[.deployments[] | select(.meta.githubCommitSha == $sha and .state == "READY")] | .[0].url // empty' \
              /tmp/vercel_resp.json 2>/dev/null || true)

            STATE=$(jq -r \
              --arg sha "$SHA" \
              '[.deployments[] | select(.meta.githubCommitSha == $sha)] | .[0].state // "not found"' \
              /tmp/vercel_resp.json 2>/dev/null || echo "parse_error")

            echo "[$i/36] state=$STATE url=${URL:-—}"

            if [ -n "$URL" ]; then
              PREVIEW_URL="https://$URL"
              echo "Resolved via API: $PREVIEW_URL"
              break
            fi

            sleep 10
          done

          if [ -z "$PREVIEW_URL" ]; then
            echo "Path 1 timed out — waiting for alias to serve sha=$SHA (24 × 10 s = 4 min max)"
            echo "Branch alias: $ALIAS_URL"

            for i in $(seq 1 24); do
              ALIAS_HTTP=$(curl -s \
                -o /dev/null \
                -w "%{http_code}" \
                --max-time 20 \
                "${ALIAS_URL}/login" 2>/dev/null || echo "000")

              if [ "$ALIAS_HTTP" = "200" ]; then
                READY=$(curl -s \
                  -H "Authorization: Bearer $VERCEL_TOKEN" \
                  "$API" 2>/dev/null \
                  | jq -r --arg sha "$SHA" \
                  '[.deployments[] | select(.meta.githubCommitSha == $sha and .state == "READY")] | .[0].url // empty')
                if [ -n "$READY" ]; then
                  echo "[$i/24] sha=$SHA READY — alias confirmed"
                  PREVIEW_URL="$ALIAS_URL"
                  break
                else
                  echo "[$i/24] alias 200 but sha=$SHA not yet READY — waiting"
                fi
              else
                echo "[$i/24] alias HTTP $ALIAS_HTTP"
              fi

              sleep 10
            done
          fi

          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::sha=$SHA not READY after 10 min. Branch alias attempted: $ALIAS_URL"
            exit 1
          fi

          echo "Resolved preview URL: $PREVIEW_URL"
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        run: node scripts/smoke-test.mjs "${{ steps.preview.outputs.url }}"
