name: Preview Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  # ── Job 1: JSON parser unit tests ──────────────────────────────────────────
  # Runs independently of any Vercel deployment.
  unit-tests:
    name: JSON parser unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run extractJsonObject tests
        run: node scripts/test-extract-json.mjs

  # ── Job 2: Provider safety + FP-001 quality gate regression suites ─────────
  # Stubbed-network suites: no provider calls, no Supabase. These are the
  # trust-layer regression guards (FP-001) — a PR that reintroduces pricing in
  # blocked mode or leaks a provider token fails here.
  safety-suites:
    name: Provider safety & FP-001 quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Provider safety suite
        run: npm run test:provider-safety
      - name: Analysis quality gate (FP-001) suite
        run: npm run test:analysis-quality-gate
      - name: Financial safety suite (Decision #047)
        run: npm run test:financial-safety

  # ── Job 3: Smoke tests against Vercel preview deployment ───────────────────
  smoke:
    name: Smoke tests on preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve Vercel preview URL
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          PROJECT_ID="prj_HgkXfIh2s8J7fdjStH4atnBpXBa2"
          TEAM_ID="team_Evt0BlM2Dy7FxfskYnlNcMo4"

          # Compute deterministic branch alias slug:
          #   lowercase → replace non-[a-z0-9] with '-' → collapse runs → trim edges
          BRANCH_SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//;s/-$//')
          ALIAS_URL="https://bettracker-git-${BRANCH_SLUG}-betracker.vercel.app"

          # VERCEL_TOKEN is required — a missing token means we cannot verify
          # which deployment the branch alias is serving, risking tests against
          # a stale build (root cause of the PR #46 false failure).
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set. Smoke tests require the Vercel API to confirm the exact commit is deployed before running. Add VERCEL_TOKEN in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

          API="https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${TEAM_ID}&limit=10"
          PREVIEW_URL=""

          # ── Path 1: exact deployment URL via Vercel API (up to 6 min) ────────
          # Polls until a deployment matching this exact commit SHA is READY,
          # then uses its unique URL. 36 × 10 s = 360 s = 6 min.
          echo "Polling Vercel API for sha=$SHA (36 × 10 s = 6 min max)..."

          for i in $(seq 1 36); do
            HTTP_CODE=$(curl -s \
              -o /tmp/vercel_resp.json \
              -w "%{http_code}" \
              --max-time 20 \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "$API" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
              echo "::error::Vercel API HTTP $HTTP_CODE — VERCEL_TOKEN may be expired or have insufficient scope (needs deployments:read)"
              exit 1
            fi

            if [ "$HTTP_CODE" != "200" ]; then
              echo "[$i/36] API HTTP $HTTP_CODE — retrying in 10s"
              sleep 10
              continue
            fi

            URL=$(jq -r \
              --arg sha "$SHA" \
              '[.deployments[] | select(.meta.githubCommitSha == $sha and .state == "READY")] | .[0].url // empty' \
              /tmp/vercel_resp.json 2>/dev/null || true)

            STATE=$(jq -r \
              --arg sha "$SHA" \
              '[.deployments[] | select(.meta.githubCommitSha == $sha)] | .[0].state // "not found"' \
              /tmp/vercel_resp.json 2>/dev/null || echo "parse_error")

            echo "[$i/36] state=$STATE url=${URL:-—}"

            if [ -n "$URL" ]; then
              PREVIEW_URL="https://$URL"
              echo "Resolved via API: $PREVIEW_URL"
              break
            fi

            sleep 10
          done

          # ── Path 2: branch alias, SHA-verified (up to 4 more min) ───────────
          # Reached only if Path 1 timed out (deployment took >6 min).
          # Uses the branch alias URL, but only after the API confirms the
          # expected SHA is READY — prevents testing against a stale build.
          # 24 × 10 s = 240 s = 4 min. Combined max wait: 10 min.
          if [ -z "$PREVIEW_URL" ]; then
            echo "Path 1 timed out — waiting for alias to serve sha=$SHA (24 × 10 s = 4 min max)"
            echo "Branch alias: $ALIAS_URL"

            for i in $(seq 1 24); do
              ALIAS_HTTP=$(curl -s \
                -o /dev/null \
                -w "%{http_code}" \
                --max-time 20 \
                "${ALIAS_URL}/login" 2>/dev/null || echo "000")

              if [ "$ALIAS_HTTP" = "200" ]; then
                # Confirm via API that the expected SHA is now READY before
                # accepting the alias as a valid test target.
                READY=$(curl -s \
                  -H "Authorization: Bearer $VERCEL_TOKEN" \
                  "$API" 2>/dev/null \
                  | jq -r --arg sha "$SHA" \
                  '[.deployments[] | select(.meta.githubCommitSha == $sha and .state == "READY")] | .[0].url // empty')

                if [ -n "$READY" ]; then
                  echo "[$i/24] sha=$SHA READY — alias confirmed"
                  PREVIEW_URL="$ALIAS_URL"
                  break
                else
                  echo "[$i/24] alias 200 but sha=$SHA not yet READY — waiting"
                fi
              else
                echo "[$i/24] alias HTTP $ALIAS_HTTP"
              fi

              sleep 10
            done
          fi

          # ── Fail clearly if neither path resolved ─────────────────────────
          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::sha=$SHA not READY after 10 min. Branch alias attempted: $ALIAS_URL"
            exit 1
          fi

          echo "Resolved preview URL: $PREVIEW_URL"
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        run: node scripts/smoke-test.mjs "${{ steps.preview.outputs.url }}"
