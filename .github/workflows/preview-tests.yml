name: Preview Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decision-log-054:
    name: Record Decision 054 in decision log
    if: github.head_ref == 'feat/decision-054-csp-phase-a' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/decision-054-csp-phase-a
          fetch-depth: 0
      - name: Append Decision 054
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/decisions.md')
          text = path.read_text(encoding='utf-8')
          heading = '## Decision #054 — CSP Report Hardening & Security Headers, Phase A'
          decision = r'''## Decision #054 — CSP Report Hardening & Security Headers, Phase A
**Date:** 2026-07-11  
**Proposed by:** CPO + Lead Engineer  
**Approved by:** CPO autonomous-window scope  
**Status:** PHASE A IMPLEMENTED / AWAITING CPO REVIEW

**Decision:** Harden CSP report ingestion and add baseline HTTP security headers while keeping CSP in Report-Only mode.

**Why:**
- Production CSP reported violations but did not block them, which is correct for observation, but the report endpoint accepted unlimited raw bodies and logged `script-sample` plus unredacted URLs.
- The application lacked explicit `nosniff`, Referrer-Policy, X-Frame-Options, and Permissions-Policy headers.
- Enforcing CSP before understanding Next.js inline hydration and external source requirements risks breaking the application.

**Phase A:**
- bounded 32 KB CSP body reader;
- legacy and Reporting API normalization;
- strict sanitization, URL query/fragment removal, and no script-sample/raw payload logging;
- durable fail-closed CSP report limits through Decision #052;
- `204/400/413/415/429/503` route contract;
- baseline security headers;
- CSP remains `Content-Security-Policy-Report-Only` with `unsafe-inline` unchanged.

**Phase B:** Not implemented. Requires production violation observation, source classification, a reviewed nonce/hash strategy, compatibility smoke, and separate CPO approval.

**Scope:** No migration, Supabase write, provider call, environment change, enrichment, odds work, or betting-signal change. FP-001 remains active.

Reference: `docs/csp-security-hardening-scope-decision-054.md`
'''
          if heading not in text:
              marker = '\n---\n\n*Last updated: 2026-07-11*'
              pos = text.rfind(marker)
              if pos == -1:
                  raise SystemExit('Decision log footer marker not found')
              text = text[:pos] + '\n---\n\n' + decision + text[pos:]
              path.write_text(text, encoding='utf-8')
          PY

          if git diff --quiet -- docs/decisions.md; then
            echo "Decision #054 already present"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/decisions.md
          git diff --cached --check
          git commit -m "docs: add Decision #054 Phase A to decision log"
          git push origin HEAD:feat/decision-054-csp-phase-a

  # ── Job 1: JSON parser unit tests ──────────────────────────────────────────
  # Runs independently of any Vercel deployment.
  unit-tests:
    name: JSON parser unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run extractJsonObject tests
        run: node scripts/test-extract-json.mjs

  # ── Job: Typecheck + lint gate ──────────────────────────────────────────────
  # Explicit required gate: the Vercel build covers production compilation but
  # is not a substitute for a blocking tsc/lint check on every PR.
  quality:
    name: Typecheck & lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint

  # ── Job 2: Provider safety + FP-001 quality gate regression suites ─────────
  # Stubbed-network suites: no provider calls, no Supabase. These are the
  # trust-layer regression guards (FP-001) — a PR that reintroduces pricing in
  # blocked mode or leaks a provider token fails here.
  safety-suites:
    name: Provider safety & FP-001 quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Provider safety suite
        run: npm run test:provider-safety
      - name: Analysis quality gate (FP-001) suite
        run: npm run test:analysis-quality-gate
      - name: "Financial safety suite (Decision #047)"
        run: npm run test:financial-safety
      - name: "Domain write boundaries suite (Decision #048)"
        run: npm run test:domain-write-boundaries
      - name: "Agent write boundaries suite (Decision #049)"
        run: npm run test:agent-write-boundaries
      - name: "Auth invite flow suite (Decision #050)"
        run: npm run test:auth-invite
      - name: "FP-001 legacy quarantine suite (Decision #051)"
        run: npm run test:fp001-quarantine
      - name: "Global rate-limit suite (Decision #052)"
        run: npm run test:rate-limit

  # ── Job 3: Smoke tests against Vercel preview deployment ───────────────────
  smoke:
    name: Smoke tests on preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve Vercel preview URL
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          PROJECT_ID="prj_HgkXfIh2s8J7fdjStH4atnBpXBa2"
          TEAM_ID="team_Evt0BlM2Dy7FxfskYnlNcMo4"

          # Compute deterministic branch alias slug:
          #   lowercase → replace non-[a-z0-9] with '-' → collapse runs → trim edges
          BRANCH_SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//;s/-$//')
          ALIAS_URL="https://bettracker-git-${BRANCH_SLUG}-betracker.vercel.app"

          # VERCEL_TOKEN is required — a missing token means we cannot verify
          # which deployment the branch alias is serving, risking tests against
          # a stale build (root cause of the PR #46 false failure).
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set. Smoke tests require the Vercel API to confirm the exact commit is deployed before running. Add VERCEL_TOKEN in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

          API="https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${TEAM_ID}&limit=10"
          PREVIEW_URL=""

          # ── Path 1: exact deployment URL via Vercel API (up to 6 min) ────────
          # Polls until a deployment matching this exact commit SHA is READY,
          # then uses its unique URL. 36 × 10 s = 360 s = 6 min.
          echo "Polling Vercel API for sha=$SHA (36 × 10 s = 6 min max)..."

          for i in $(seq 1 36); do
            HTTP_CODE=$(curl -s \
              -o /tmp/vercel_resp.json \
              -w "%{http_code}" \
              --max-time 20 \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "$API" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
              echo "::error::Vercel API HTTP $HTTP_CODE — VERCEL_TOKEN may be expired or have insufficient scope (needs deployments:read)"
              exit 1
            fi

            if [ "$HTTP_CODE" != "200" ]; then
              echo "[$i/36] API HTTP $HTTP_CODE — retrying in 10s"
              sleep 10
              continue
            fi

            URL=$(jq -r \
              --arg sha "$SHA" \
              '[.deployments[] | select(.meta.githubCommitSha == $sha and .state == "READY")] | .[0].url // empty' \
              /tmp/vercel_resp.json 2>/dev/null || true)

            STATE=$(jq -r \
              --arg sha "$SHA" \
              '[.deployments[] | select(.meta.githubCommitSha == $sha)] | .[0].state // "not found"' \
              /tmp/vercel_resp.json 2>/dev/null || echo "parse_error")

            echo "[$i/36] state=$STATE url=${URL:-—}"

            if [ -n "$URL" ]; then
              PREVIEW_URL="https://$URL"
              echo "Resolved via API: $PREVIEW_URL"
              break
            fi

            sleep 10
          done

          # ── Path 2: branch alias, SHA-verified (up to 4 more min) ───────────
          # Reached only if Path 1 timed out (deployment took >6 min).
          # Uses the branch alias URL, but only after the API confirms the
          # expected SHA is READY — prevents testing against a stale build.
          # 24 × 10 s = 240 s = 4 min. Combined max wait: 10 min.
          if [ -z "$PREVIEW_URL" ]; then
            echo "Path 1 timed out — waiting for alias to serve sha=$SHA (24 × 10 s = 4 min max)"
            echo "Branch alias: $ALIAS_URL"

            for i in $(seq 1 24); do
              ALIAS_HTTP=$(curl -s \
                -o /dev/null \
                -w "%{http_code}" \
                --max-time 20 \
                "${ALIAS_URL}/login" 2>/dev/null || echo "000")

              if [ "$ALIAS_HTTP" = "200" ]; then
                # Confirm via API that the expected SHA is now READY before
                # accepting the alias as a valid test target.
                READY=$(curl -s \
                  -H "Authorization: Bearer $VERCEL_TOKEN" \
                  "$API" 2>/dev/null \
                  | jq -r --arg sha "$SHA" \
                  '[.deployments[] | select(.meta.githubCommitSha == $sha and .state == "READY")] | .[0].url // empty')

                if [ -n "$READY" ]; then
                  echo "[$i/24] sha=$SHA READY — alias confirmed"
                  PREVIEW_URL="$ALIAS_URL"
                  break
                else
                  echo "[$i/24] alias 200 but sha=$SHA not yet READY — waiting"
                fi
              else
                echo "[$i/24] alias HTTP $ALIAS_HTTP"
              fi

              sleep 10
            done
          fi

          # ── Fail clearly if neither path resolved ─────────────────────────
          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::sha=$SHA not READY after 10 min. Branch alias attempted: $ALIAS_URL"
            exit 1
          fi

          echo "Resolved preview URL: $PREVIEW_URL"
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        run: node scripts/smoke-test.mjs "${{ steps.preview.outputs.url }}"
