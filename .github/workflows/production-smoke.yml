name: Production Analyst Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/production-smoke.yml'
      - 'scripts/production-smoke.spec.cjs'

permissions:
  contents: read

concurrency:
  group: production-analyst-smoke
  cancel-in-progress: false

jobs:
  analyst-smoke:
    name: Authenticated Analyst smoke (no financial writes)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      QA_BASE_URL: https://btdk.app
      QA_SMOKE_EMAIL: ${{ secrets.QA_SMOKE_EMAIL }}
      QA_SMOKE_PASSWORD: ${{ secrets.QA_SMOKE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify required secrets are configured
        shell: bash
        run: |
          if [ -z "$QA_SMOKE_EMAIL" ] || [ -z "$QA_SMOKE_PASSWORD" ]; then
            echo "::error::QA_SMOKE_EMAIL and QA_SMOKE_PASSWORD repository secrets are required"
            exit 1
          fi

      - name: Install repository dependencies
        run: npm ci

      - name: Install pinned Playwright runtime
        run: |
          npm install --no-save --ignore-scripts @playwright/test@1.55.0
          npx playwright install --with-deps chromium

      - name: Run authenticated production smoke
        run: npx playwright test scripts/production-smoke.spec.cjs --reporter=line --workers=1
